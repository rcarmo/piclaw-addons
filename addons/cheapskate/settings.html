<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheapskate — Free-tier Provider Rotation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a2e; --bg-card: #16213e; --bg-row: #0f3460; --bg-row-alt: #12294d;
    --bg-hover: #1a3a5c; --border: #2a2a4a; --border-hi: #6c63ff44;
    --text: #e0e0e0; --text-dim: #9090b0; --accent: #6c63ff; --accent-hi: #8b84ff;
    --success: #4ade80; --danger: #f87171; --warn: #fbbf24; --radius: 8px;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; line-height: 1.5; }
  .page { max-width: 1200px; margin: 0 auto; padding: 28px 20px 48px; }
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .header h1 .pill { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 9px; }
  .subtitle { margin-top: 8px; color: var(--text-dim); font-size: 13px; min-height: 20px; }
  .subtitle strong { color: var(--text); }
  .active-badge { display: inline-flex; align-items: center; gap: 5px; background: #6c63ff22; border: 1px solid var(--border-hi); border-radius: 20px; padding: 1px 9px; font-size: 12px; color: var(--accent-hi); margin-left: 8px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 720px; }
  thead tr { background: #0d1b36; border-bottom: 1px solid var(--border); }
  thead th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-dim); white-space: nowrap; }
  thead th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(odd) { background: var(--bg-row); }
  tbody tr:nth-child(even) { background: var(--bg-row-alt); }
  tbody tr:hover { background: var(--bg-hover); }
  tbody tr.disabled-row { opacity: 0.55; }
  td { padding: 11px 14px; vertical-align: middle; }
  td.center { text-align: center; }
  .provider-name { font-weight: 600; }
  .model-name { color: var(--text-dim); font-size: 12px; }
  .key-env { display: block; font-size: 10px; font-family: monospace; color: #7070a0; margin-top: 2px; }
  .rate-limits { font-size: 12px; color: var(--text-dim); line-height: 1.8; }
  .rate-limits span { display: inline-block; min-width: 26px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #5a5a80; margin-right: 3px; }
  .ctx-value { font-size: 13px; font-weight: 500; }
  .ctx-k { font-size: 11px; color: var(--text-dim); }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .tag-reasoning { background: #6c63ff22; color: var(--accent-hi); border: 1px solid #6c63ff33; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .status-active { background: #4ade8022; color: var(--success); border: 1px solid #4ade8033; }
  .status-available { background: #60a5fa22; color: #60a5fa; border: 1px solid #60a5fa33; }
  .status-cooldown { background: #fbbf2422; color: var(--warn); border: 1px solid #fbbf2433; }
  .status-nokey { background: #f8717122; color: var(--danger); border: 1px solid #f8717133; }
  .cb-wrap { display: flex; justify-content: center; align-items: center; }
  input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  input[type="checkbox"]:disabled { cursor: not-allowed; opacity: 0.35; }
  .footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-top: 1px solid var(--border); background: #0d1b36; gap: 12px; flex-wrap: wrap; }
  .footer-info { font-size: 12px; color: var(--text-dim); }
  .footer-info strong { color: var(--text); }
  .btn-save { display: inline-flex; align-items: center; gap: 7px; background: var(--accent); color: #fff; border: none; border-radius: 5px; padding: 9px 22px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: var(--accent-hi); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  #toast { position: fixed; bottom: 28px; right: 28px; padding: 11px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px #00000060; opacity: 0; transform: translateY(10px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 999; max-width: 340px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { background: #1a3a2a; color: var(--success); border: 1px solid #4ade8033; }
  #toast.err { background: #3a1a1a; color: var(--danger); border: 1px solid #f8717133; }
  .state-msg { padding: 40px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) { .page { padding: 16px 12px 40px; } .header h1 { font-size: 18px; } }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>⚡ Cheapskate <span class="pill">Settings</span></h1>
    <div class="subtitle" id="subtitle"><div class="spinner" style="width:14px;height:14px;display:inline-block;vertical-align:middle"></div> Loading…</div>
  </div>
  <div class="card">
    <div id="table-container"><div class="state-msg"><div class="spinner"></div><div>Fetching backends…</div></div></div>
  </div>
</div>
<div id="toast"></div>
<script>
(function () {
  function fmt(n) { return n == null ? '—' : Number(n).toLocaleString('en-US'); }
  function fmtCtx(n) { if (n >= 1e6) return (n/1e6).toFixed(n%1e6===0?0:1)+'M'; if (n >= 1e3) return Math.round(n/1e3)+'K'; return String(n); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function statusBadge(b) {
    if (!b.hasKey) return '<span class="status-badge status-nokey">❌ No key</span>';
    if (b.active) return '<span class="status-badge status-active">🟢 Active</span>';
    if (b.cooldownSeconds > 0) return '<span class="status-badge status-cooldown">⏳ Cooldown ('+b.cooldownSeconds+'s)</span>';
    if (b.available) return '<span class="status-badge status-available">✅ Available</span>';
    return '<span class="status-badge status-nokey">❌ Disabled</span>';
  }

  let toastT;
  function toast(msg, type) { const el=document.getElementById('toast'); el.textContent=msg; el.className='show '+type; clearTimeout(toastT); toastT=setTimeout(()=>{el.className=''},3200); }

  function render(data) {
    const {backends, currentBackendId} = data;
    const sub = document.getElementById('subtitle');
    const active = backends.find(b=>b.id===currentBackendId);
    sub.innerHTML = '<strong>'+backends.length+'</strong> backends, <strong>'+backends.filter(b=>b.hasKey).length+'</strong> with keys' +
      (active ? ' <span class="active-badge">🟢 '+esc(active.name)+' → '+esc(active.model)+'</span>' : '');

    const rows = backends.map(b => {
      const dis = !b.hasKey ? 'disabled' : '';
      const chk = b.enabled && b.hasKey ? 'checked' : '';
      return '<tr class="'+(b.hasKey?'':'disabled-row')+'">' +
        '<td class="center"><div class="cb-wrap"><input type="checkbox" class="backend-cb" data-id="'+esc(b.id)+'" '+chk+' '+dis+'></div></td>' +
        '<td><span class="provider-name">'+esc(b.name)+'</span><span class="key-env">'+esc(b.apiKeyEnv)+'</span>' +
          (b.reasoning ? '<span class="tag tag-reasoning" style="margin-top:4px">✦ Reasoning</span>' : '') + '</td>' +
        '<td class="model-name">'+esc(b.model)+'</td>' +
        '<td class="center">'+(b.hasKey?'<span title="Key set" style="font-size:16px">✅</span>':'<span title="Missing '+esc(b.apiKeyEnv)+'" style="font-size:16px">❌</span>')+'</td>' +
        '<td class="rate-limits"><div><span>RPM</span>'+fmt(b.rpm)+'</div><div><span>TPM</span>'+fmt(b.tpm)+'</div><div><span>TPD</span>'+fmt(b.tpd)+'</div></td>' +
        '<td><span class="ctx-value">'+fmtCtx(b.contextWindow)+'</span>'+(b.maxTokens?'<br><span class="ctx-k">out: '+fmtCtx(b.maxTokens)+'</span>':'')+'</td>' +
        '<td>'+statusBadge(b)+'</td></tr>';
    }).join('');

    document.getElementById('table-container').innerHTML =
      '<div class="table-wrap"><table><thead><tr>' +
      '<th class="center" style="width:60px">Enabled</th><th>Provider</th><th>Model</th><th class="center">API Key</th><th>Rate Limits</th><th>Context</th><th>Status</th>' +
      '</tr></thead><tbody>'+rows+'</tbody></table></div>' +
      '<div class="footer"><div class="footer-info"><strong id="en-count">'+backends.filter(b=>b.enabled&&b.hasKey).length+'</strong> of <strong>'+backends.length+'</strong> enabled</div>' +
      '<button class="btn-save" id="save-btn">💾 Save Changes</button></div>';

    document.querySelectorAll('.backend-cb').forEach(cb => cb.addEventListener('change', () => {
      document.getElementById('en-count').textContent = document.querySelectorAll('.backend-cb:checked').length;
    }));

    document.getElementById('save-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-btn');
      btn.disabled = true; btn.textContent = 'Saving…';
      const ids = Array.from(document.querySelectorAll('.backend-cb:checked')).map(c=>c.dataset.id);
      try {
        const r = await fetch('/cheapskate/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({enabledBackendIds:ids})});
        if (!r.ok) throw new Error('HTTP '+r.status);
        toast('✅ Saved','ok');
      } catch(e) { toast('❌ '+e.message,'err'); }
      btn.disabled = false; btn.textContent = '💾 Save Changes';
    });
  }

  async function init() {
    try {
      const r = await fetch('/cheapskate/api/config');
      if (!r.ok) throw new Error('HTTP '+r.status+' '+r.statusText);
      render(await r.json());
    } catch(e) {
      document.getElementById('subtitle').textContent = 'Failed to load';
      document.getElementById('table-container').innerHTML = '<div class="state-msg">⚠️ '+esc(e.message)+'<br><button class="btn-save" onclick="location.reload()" style="margin-top:12px">Retry</button></div>';
    }
  }
  init();
})();
</script>
</body>
</html>
