<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system,'Segoe UI',Helvetica,sans-serif">
  <style>
    .bg    { fill:#f4f6fb }
    .box   { stroke-width:1.5; rx:10 }
    .repo  { fill:#e0f2fe; stroke:#0284c7 }
    .ci    { fill:#dcfce7; stroke:#16a34a }
    .store { fill:#fef3c7; stroke:#d97706 }
    .rt    { fill:#ede9fe; stroke:#7c3aed }
    .user  { fill:#fce7f3; stroke:#db2777 }
    .title { font-size:12px; font-weight:700; fill:#1a2a40 }
    .sub   { font-size:9.5px; fill:#5070a0 }
    .label { font-size:9px; fill:#1a2a40; font-weight:600 }
    .desc  { font-size:8.5px; fill:#5070a0 }
    .mono  { font-size:8px; fill:#334155; font-family:'SF Mono','Fira Mono',monospace }
    .arrow { stroke-width:1.8; fill:none }
    .or-label { font-size:10px; font-weight:800; fill:#94a3b8; text-anchor:middle }
  </style>
  <defs>
    <marker id="ar-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7z" fill="#0284c7"/></marker>
    <marker id="ar-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7z" fill="#16a34a"/></marker>
    <marker id="ar-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7z" fill="#d97706"/></marker>
    <marker id="ar-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7z" fill="#7c3aed"/></marker>
    <marker id="ar-pink" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7z" fill="#db2777"/></marker>
    <marker id="ar-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7z" fill="#94a3b8"/></marker>
  </defs>

  <rect class="bg" width="880" height="520" rx="0"/>

  <!-- ═══ Title ═══ -->
  <text x="440" y="28" text-anchor="middle" font-size="15" font-weight="800" fill="#0f172a">Add-on Installation Architecture</text>

  <!-- ═══ Row 1: Source ═══ -->

  <!-- Repo box -->
  <rect x="30" y="50" width="200" height="90" class="box repo"/>
  <text x="130" y="72" text-anchor="middle" class="title">piclaw-addons repo</text>
  <text x="48" y="92" class="mono">addons/proxmox/package.json</text>
  <text x="48" y="105" class="mono">addons/eml-viewer/index.ts</text>
  <text x="48" y="118" class="mono">scripts/sync-catalog.ts</text>

  <!-- Arrow: repo → sync-catalog CI -->
  <line x1="230" y1="95" x2="288" y2="95" class="arrow" stroke="#0284c7" marker-end="url(#ar-blue)"/>
  <text x="259" y="88" class="label" text-anchor="middle">push</text>

  <!-- sync-catalog CI -->
  <rect x="290" y="60" width="160" height="70" class="box ci"/>
  <text x="370" y="82" text-anchor="middle" class="title">sync-catalog</text>
  <text x="370" y="96" text-anchor="middle" class="sub">GitHub Actions</text>
  <text x="370" y="110" text-anchor="middle" class="desc">regenerates catalog.json</text>

  <!-- Arrow: sync → build CI -->
  <line x1="450" y1="95" x2="508" y2="95" class="arrow" stroke="#16a34a" marker-end="url(#ar-green)"/>
  <text x="479" y="88" class="label" text-anchor="middle">commit</text>

  <!-- build + publish CI -->
  <rect x="510" y="50" width="170" height="90" class="box ci"/>
  <text x="595" y="72" text-anchor="middle" class="title">build + publish</text>
  <text x="595" y="86" text-anchor="middle" class="sub">GitHub Actions</text>
  <text x="528" y="105" class="desc">• builds docs site</text>
  <text x="528" y="118" class="desc">• publishes npm packages</text>

  <!-- ═══ Row 2: Stores ═══ -->

  <!-- Arrow: build → GitHub Packages -->
  <line x1="595" y1="140" x2="595" y2="178" class="arrow" stroke="#d97706" marker-end="url(#ar-amber)"/>

  <!-- GitHub Packages -->
  <rect x="490" y="180" width="210" height="80" class="box store"/>
  <text x="595" y="202" text-anchor="middle" class="title">GitHub Packages</text>
  <text x="595" y="216" text-anchor="middle" class="sub">npm registry</text>
  <text x="508" y="236" class="mono">@rcarmo/piclaw-addon-proxmox</text>
  <text x="508" y="248" class="mono">@rcarmo/piclaw-addon-eml-viewer</text>

  <!-- Arrow: build → GitHub Pages -->
  <path d="M 680 95 Q 740 95, 740 178" class="arrow" stroke="#d97706" marker-end="url(#ar-amber)"/>

  <!-- GitHub Pages -->
  <rect x="710" y="180" width="150" height="80" class="box store"/>
  <text x="785" y="202" text-anchor="middle" class="title">GitHub Pages</text>
  <text x="785" y="216" text-anchor="middle" class="sub">catalog + docs</text>
  <text x="728" y="236" class="mono">catalog.json</text>
  <text x="728" y="248" class="mono">rcarmo.github.io/…</text>

  <!-- ═══ Row 3: piclaw runtime ═══ -->

  <!-- piclaw runtime box -->
  <rect x="80" y="310" width="460" height="120" class="box rt"/>
  <text x="310" y="335" text-anchor="middle" class="title">piclaw runtime</text>

  <!-- Inside: .npmrc config -->
  <rect x="100" y="348" width="200" height="56" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="110" y="364" class="label">.piclaw/addons/.npmrc</text>
  <text x="110" y="378" class="mono">@rcarmo:registry=https://npm.pkg.github.com</text>
  <text x="110" y="390" class="mono">//npm.pkg.github.com/:_authToken=${TOKEN}</text>

  <!-- Inside: bun add -->
  <rect x="320" y="348" width="200" height="56" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="330" y="364" class="label">Install handler</text>
  <text x="330" y="380" class="mono">bun add @rcarmo/piclaw-addon-*</text>
  <text x="330" y="392" class="desc">→ node_modules/@rcarmo/…</text>

  <!-- Arrow: runtime fetches catalog from GitHub Pages -->
  <path d="M 540 360 Q 660 360, 785 262" class="arrow" stroke="#d97706" stroke-dasharray="5,3" marker-end="url(#ar-amber)"/>
  <text x="660" y="310" class="label" text-anchor="middle">fetch catalog</text>

  <!-- Arrow: runtime installs from GitHub Packages -->
  <path d="M 520 390 Q 580 390, 595 262" class="arrow" stroke="#7c3aed" marker-end="url(#ar-purple)"/>
  <text x="575" y="300" class="label" text-anchor="middle">bun add</text>

  <!-- ═══ Row 4: User entry points ═══ -->

  <!-- Web UI -->
  <rect x="50" y="460" width="180" height="46" class="box user"/>
  <text x="140" y="480" text-anchor="middle" class="title">Settings → Add-ons</text>
  <text x="140" y="494" text-anchor="middle" class="sub">click Install → auto</text>

  <!-- Arrow: web UI → runtime -->
  <line x1="140" y1="460" x2="200" y2="432" class="arrow" stroke="#db2777" marker-end="url(#ar-pink)"/>

  <!-- OR -->
  <text x="280" y="488" class="or-label">OR</text>

  <!-- CLI bun add -->
  <rect x="320" y="460" width="220" height="46" class="box user"/>
  <text x="430" y="478" text-anchor="middle" class="title">Terminal</text>
  <text x="430" y="492" text-anchor="middle" class="mono">bun add @rcarmo/piclaw-addon-*</text>

  <!-- Arrow: CLI → runtime -->
  <line x1="430" y1="460" x2="380" y2="432" class="arrow" stroke="#db2777" marker-end="url(#ar-pink)"/>

  <!-- OR -->
  <text x="585" y="488" class="or-label">OR</text>

  <!-- pi install -->
  <rect x="630" y="460" width="230" height="46" class="box user"/>
  <text x="745" y="478" text-anchor="middle" class="title">Pi CLI</text>
  <text x="745" y="492" text-anchor="middle" class="mono">pi install npm:@rcarmo/piclaw-addon-*</text>

  <!-- Arrow: pi install → GitHub Packages (direct) -->
  <path d="M 745 460 Q 745 390, 700 262" class="arrow" stroke="#db2777" stroke-dasharray="5,3" marker-end="url(#ar-pink)"/>
  <text x="750" y="370" class="desc">direct npm</text>

  <!-- Fallback annotation -->
  <rect x="30" y="180" width="190" height="46" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
  <text x="125" y="198" text-anchor="middle" class="label" fill="#92400e">Fallback (no auth)</text>
  <text x="125" y="212" text-anchor="middle" class="desc" fill="#92400e">GitHub API file-by-file download</text>

  <path d="M 220 203 Q 260 203, 310 310" class="arrow" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ar-gray)"/>
</svg>
