name: Build & deploy docs + tarballs

# This workflow publishes the GitHub Pages site and the public add-on tarballs
# under docs/packages/. It must run whenever an add-on package changes,
# especially package.json version bumps.
on:
  push:
    branches: [main]
    paths:
      - 'catalog.json'
      - 'build.ts'
      - 'assets/**'
      - 'addons/**'
      - 'addons/**/package.json'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Build site and package tarballs
        run: bun run build.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Copy assets into docs
        run: mkdir -p docs/assets && cp -r assets/* docs/assets/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
