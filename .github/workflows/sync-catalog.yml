name: sync-catalog

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'addons/**'
      - 'scripts/sync-catalog.ts'
      - '.github/workflows/sync-catalog.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Regenerate catalog and root package metadata
        run: bun run sync:catalog

      - name: Commit changes
        run: |
          if git diff --quiet -- package.json catalog.json; then
            echo "No metadata changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json catalog.json
          git commit -m "chore: sync catalog metadata"
          git push
