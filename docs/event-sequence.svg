<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="-apple-system,'Segoe UI',Helvetica,sans-serif">
  <style>
    .bg   { fill:#f4f6fb }
    .lane { fill:#fff; stroke:#c8d4e8; stroke-width:1 }
    .lbl  { font-size:12px; font-weight:700; fill:#1a2a40; text-anchor:middle }
    .sub  { font-size:10px; fill:#5070a0; text-anchor:middle }
    .life { stroke:#c8d4e8; stroke-width:1.5; stroke-dasharray:5,4 }
    .act  { fill:#dbeafe; stroke:#3b82f6; stroke-width:1.5; rx:4 }
    .act2 { fill:#e0f2fe; stroke:#0284c7; stroke-width:1.5 }
    .act3 { fill:#dcfce7; stroke:#16a34a; stroke-width:1.5 }
    .act4 { fill:#fef3c7; stroke:#d97706; stroke-width:1.5 }
    .arr  { fill:none; stroke:#3b82f6; stroke-width:1.5; marker-end:url(#ah) }
    .arr2 { fill:none; stroke:#0284c7; stroke-width:1.5; marker-end:url(#ah) }
    .arr3 { fill:none; stroke:#16a34a; stroke-width:1.5; marker-end:url(#ah) }
    .arr4 { fill:none; stroke:#d97706; stroke-width:1.5; marker-end:url(#ah) }
    .msg  { font-size:10.5px; fill:#1a2a40 }
    .note { font-size:10px; fill:#5070a0; font-style:italic }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7z" fill="#3b82f6"/>
    </marker>
    <marker id="ah2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7z" fill="#0284c7"/>
    </marker>
    <marker id="ah3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7z" fill="#16a34a"/>
    </marker>
    <marker id="ah4" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7z" fill="#d97706"/>
    </marker>
  </defs>

  <rect class="bg" width="860" height="420"/>

  <!-- Participant boxes -->
  <!-- Dev: x=80  Addon code: x=220  sync-catalog: x=380  catalog.json: x=530  build+deploy: x=680  gh-pages: x=820 -->
  <rect x="30"  y="16" width="100" height="48" rx="8" class="lane"/>
  <text x="80"  y="36" class="lbl">Developer</text>
  <text x="80"  y="52" class="sub">/ owner</text>

  <rect x="170" y="16" width="100" height="48" rx="8" class="lane"/>
  <text x="220" y="36" class="lbl">addons/</text>
  <text x="220" y="52" class="sub">source commit</text>

  <rect x="330" y="16" width="100" height="48" rx="8" class="lane"/>
  <text x="380" y="36" class="lbl">sync-catalog</text>
  <text x="380" y="52" class="sub">workflow</text>

  <rect x="480" y="16" width="100" height="48" rx="8" class="lane"/>
  <text x="530" y="36" class="lbl">catalog.json</text>
  <text x="530" y="52" class="sub">committed</text>

  <rect x="630" y="16" width="100" height="48" rx="8" class="lane"/>
  <text x="680" y="36" class="lbl">build + deploy</text>
  <text x="680" y="52" class="sub">workflow</text>

  <rect x="770" y="16" width="80"  height="48" rx="8" class="lane"/>
  <text x="810" y="36" class="lbl">gh-pages</text>
  <text x="810" y="52" class="sub">live site</text>

  <!-- Lifelines -->
  <line x1="80"  y1="64" x2="80"  y2="410" class="life"/>
  <line x1="220" y1="64" x2="220" y2="410" class="life"/>
  <line x1="380" y1="64" x2="380" y2="410" class="life"/>
  <line x1="530" y1="64" x2="530" y2="410" class="life"/>
  <line x1="680" y1="64" x2="680" y2="410" class="life"/>
  <line x1="810" y1="64" x2="810" y2="410" class="life"/>

  <!-- Step 1: dev pushes addon change -->
  <line x1="80" y1="100" x2="214" y2="100" class="arr"/>
  <text x="148" y="95" class="msg" text-anchor="middle">git push addons/&lt;slug&gt;</text>

  <!-- activation: addon code -->
  <rect x="213" y="94" width="14" height="30" rx="2" class="act"/>

  <!-- Step 2: push triggers sync-catalog -->
  <line x1="220" y1="130" x2="374" y2="130" class="arr" stroke="#0284c7" marker-end="url(#ah2)"/>
  <text x="297" y="125" class="msg" text-anchor="middle">triggers on: push paths: addons/**</text>

  <!-- activation: sync-catalog -->
  <rect x="373" y="124" width="14" height="50" rx="2" class="act2"/>

  <!-- Step 3: sync-catalog writes catalog.json -->
  <line x1="380" y1="155" x2="524" y2="155" class="arr" stroke="#0284c7" marker-end="url(#ah2)"/>
  <text x="452" y="150" class="msg" text-anchor="middle">bun sync:catalog → commit</text>

  <!-- activation: catalog.json -->
  <rect x="523" y="149" width="14" height="30" rx="2" class="act2"/>

  <!-- Step 4: catalog.json commit triggers build -->
  <line x1="530" y1="200" x2="674" y2="200" class="arr" stroke="#16a34a" marker-end="url(#ah3)"/>
  <text x="602" y="195" class="msg" text-anchor="middle">triggers on: push paths: catalog.json</text>

  <!-- activation: build+deploy -->
  <rect x="673" y="194" width="14" height="70" rx="2" class="act3"/>

  <!-- Step 5: build runs -->
  <line x1="680" y1="230" x2="680" y2="230" class="arr3"/>
  <text x="700" y="228" class="note">bun build.ts</text>
  <text x="700" y="242" class="note">→ docs/</text>

  <!-- Step 6: deploy to gh-pages -->
  <line x1="680" y1="255" x2="804" y2="255" class="arr" stroke="#d97706" marker-end="url(#ah4)"/>
  <text x="742" y="250" class="msg" text-anchor="middle">push docs/ → gh-pages</text>

  <!-- activation: gh-pages -->
  <rect x="803" y="249" width="14" height="30" rx="2" class="act4"/>

  <!-- Step 7: site live -->
  <text x="810" y="295" class="note">site live</text>
  <text x="810" y="308" class="note">~30s later</text>

  <!-- manual trigger note -->
  <rect x="30" y="330" width="200" height="36" rx="6" fill="#fef9c3" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="348" class="note" text-anchor="middle" font-style="normal" font-weight="700" fill="#92400e">workflow_dispatch</text>
  <text x="130" y="362" class="note" text-anchor="middle" fill="#92400e">also triggers build directly</text>

  <!-- legend: also trig -->
  <line x1="230" y1="346" x2="674" y2="346" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah4)"/>
</svg>
